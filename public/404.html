<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Redirecting...</title>
    <script>
      var path = window.location.pathname.replace('/health-flow-sim', '');
      var search = window.location.search || '';
      var hash = window.location.hash || '';
      window.location.replace('/health-flow-sim/' + '?redirect=' + encodeURIComponent(path + search + hash));
    </script>
  </head>
  <body></body>
</html>
